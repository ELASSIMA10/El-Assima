name: CarteNabil-iOS-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Regenerate Platforms
        run: |
          flutter create --project-name=carte_nabil --platforms=ios,web,android .
          flutter pub get
          # Ensure camera permissions are added to Info.plist
          if [ -f ios/Runner/Info.plist ]; then
            sed -i '' '/<dict>/a \
            <key>NSCameraUsageDescription</key>\n<string>Scan de cartes de membres</string>\n<key>NSMicrophoneUsageDescription</key>\n<string>Utilisation du micro pour le scanner</string>' ios/Runner/Info.plist
          fi
          # Force iOS 13.0 in Podfile
          if [ -f ios/Podfile ]; then
            sed -i "s/# platform :ios, '11.0'/platform :ios, '13.0'/g" ios/Podfile
            sed -i "s/platform :ios, '11.0'/platform :ios, '13.0'/g" ios/Podfile
            sed -i "s/platform :ios, '12.0'/platform :ios, '13.0'/g" ios/Podfile
            sed -i "s/platform :ios, '10.0'/platform :ios, '13.0'/g" ios/Podfile
          fi

      - name: Build iOS (No Codesign)
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Upload iOS App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ASSIMA-10-iOS-App
          path: build/ios/iphoneos/Runner.app
