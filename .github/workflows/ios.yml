name: CarteNabil-iOS-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Verify or Repair iOS Project
        run: |
          if [ ! -d "ios" ] || [ ! -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
            echo "🛠️ iOS project missing or incomplete. Repairing..."
            
            # Suppression du dossier potentiellement corrompu
            rm -rf ios
            
            # Régénération propre
            flutter create --platforms=ios .
            
            # Configure Git
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Commit & Push des fichiers de base
            git add ios/
            git commit -m "chore: Auto-repair missing iOS project files" || echo "No changes to commit"
            git push origin HEAD:master || git push origin HEAD:main || echo "Push failed, but continuing build"
          fi

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Install iOS pods
        run: |
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload iOS App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ASSIMA-10-App-iOS
          path: build/ios/iphoneos/Runner.app
