# Trigger Build Final
name: CarteNabil-Android-Build-APK-Final

on:
  push:
    branches:
      - main
      - master
      - trigger-build-v3
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Android Native Folders
        run: |
          flutter create --org com.supportclub.carte --project-name carte_nabil . --platforms=android --no-overwrite

      - name: Configure Android Build (Ultimate Fix)
        run: |
          # 1. Force Root build.gradle for Kotlin 1.9.24
          cat > android/build.gradle <<EOF
          buildscript {
              ext.kotlin_version = '1.9.24'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version"
                  classpath 'com.google.gms:google-services:4.4.1'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
              project.evaluationDependsOn(':app')
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # 2. Patch settings.gradle to align with Kotlin 1.9.24 and Google Services
          # On remplace toute declaration de plugin kotlin et on ajoute google-services
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24" apply false/g' android/settings.gradle || true
          if ! grep -q "com.google.gms.google-services" android/settings.gradle; then
            sed -i '/plugins {/a \    id "com.google.gms.google-services" version "4.4.1" apply false' android/settings.gradle
          fi

          # 3. Patch app/build.gradle (Namespace, ApplicationId, SDKs)
          sed -i -E 's/namespace[[:space:]]*=?[[:space:]]*".*"/namespace = "com.supportclub.carte"/g' android/app/build.gradle
          sed -i -E 's/applicationId[[:space:]]*=?[[:space:]]*".*"/applicationId = "com.supportclub.carte"/g' android/app/build.gradle
          sed -i -E 's/minSdk[A-Za-z]*[[:space:]]*=?[[:space:]]*.*/minSdk = 23/g' android/app/build.gradle
          sed -i -E 's/targetSdk[A-Za-z]*[[:space:]]*=?[[:space:]]*.*/targetSdk = 34/g' android/app/build.gradle
          
          # 4. Finalizing plugins and manifest
          if ! grep -q "com.google.gms.google-services" android/app/build.gradle; then
            echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          fi
          sed -i '/android:minSdkVersion="[0-9]*"/d' android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label=".*"/android:label="ASSIMA-10"/' android/app/src/main/AndroidManifest.xml

      - name: Inject Google Services JSON
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON_BASE64 secret not found."
          fi

      - name: Build APK Release
        run: |
          flutter pub get
          flutter build apk --release --no-shrink --target-platform android-arm64 --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ASSIMA-10-Final-APK
          path: build/app/outputs/flutter-apk/app-release-arm64-v8a-release.apk
